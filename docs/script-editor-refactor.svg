<svg viewBox="0 0 680 455" width="100%" role="img" aria-label="脚本编辑器复用方案对比图" xmlns="http://www.w3.org/2000/svg">
  <title>脚本编辑器复用方案对比</title>
  <desc>左侧为当前 Swing 原生实现，右侧为复用 IDEA EditorTextField 后的目标架构</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">脚本编辑器复用方案</text>
  <text x="340" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#5F5E5A">8 处脚本编辑场景，从 Swing 原生组件迁移到 IDEA 平台编辑器</text>

  <rect x="40" y="80" width="270" height="300" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="175" y="106" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">当前实现</text>
  <text x="175" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#5F5E5A">Swing 原生组件</text>

  <rect x="60" y="144" width="230" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="175" y="164" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">JBTextArea / JBTextField</text>
  <text x="175" y="182" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#5F5E5A">纯文本输入框</text>

  <rect x="60" y="214" width="230" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="175" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">LineNumberGutter（手写）</text>
  <text x="175" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#5F5E5A">paintComponent 画行号</text>

  <rect x="60" y="284" width="230" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text x="175" y="304" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441">Font("Monospaced")</text>
  <text x="175" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#5F5E5A">硬编码字体</text>

  <line x1="60" y1="346" x2="290" y2="346" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="175" y="362" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#5F5E5A">无语法高亮 · 无补全 · 主题硬编码</text>

  <rect x="370" y="80" width="270" height="300" rx="12" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="505" y="106" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">复用 EditorTextField</text>
  <text x="505" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">IDEA 平台编辑器</text>

  <rect x="390" y="144" width="230" height="56" rx="8" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="505" y="164" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">EditorTextField</text>
  <text x="505" y="182" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">可嵌入 Dialog / Panel</text>

  <rect x="390" y="214" width="230" height="56" rx="8" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="505" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">FileType（Shell / 自定义）</text>
  <text x="505" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">驱动语法高亮</text>

  <rect x="390" y="284" width="230" height="56" rx="8" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="505" y="304" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">内置 gutter + 主题适配</text>
  <text x="505" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">可删除 LineNumberGutter</text>

  <line x1="390" y1="346" x2="620" y2="346" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="505" y="362" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">语法高亮 · 括号匹配 · 折叠 · 主题自适应</text>

  <path d="M315 210 L360 210" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="337" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#534AB7">改造</text>

  <rect x="40" y="405" width="600" height="30" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">8 处场景可改造 · 已有先例：RemoteFileBrowserService 用 FileEditorManager 打开远程文件</text>
</svg>
